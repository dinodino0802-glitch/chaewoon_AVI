<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비디오 플레이어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .video-section {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
    
    /* VHS 스캔라인 효과 */
    video.vhs-effect::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 2;
    }
    
    .text-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    
    .text-overlay.show {
      opacity: 1;
    }
    
    .text-overlay img {
      width: auto;
      height: auto;
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
    }
    
    /* 시간 오버레이 - 영상 위에 표시 */
    .time-overlay {
      position: absolute;
      transform: translate(-50%, -50%);  /* 위치의 중심을 기준으로 정렬 */
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      z-index: 8;
      pointer-events: none;
    }
    
    .time-overlay.show {
      opacity: 1;
    }
    
    .time-display {
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      line-height: 1;
    }
    
    .time-label {
      margin-top: 20px;
      letter-spacing: 2px;
    }
    
    .loading {
      position: absolute;
      color: white;
      font-size: 18px;
      z-index: 10;
    }
    
    .controls-section {
      padding: 30px;
    }
    
    .keyboard-hints {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .hint {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    
    .hint-key {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #667eea;
      color: white;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .hint-text {
      font-size: 13px;
      color: #555;
    }
    
    .status {
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }
    
    .status.active {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid #4caf50;
    }
    
    .status.timer-end {
      background: #ffebee;
      color: #c62828;
      border-left: 4px solid #f44336;
      animation: pulse 0.5s ease-in-out;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    /* 타이머 입력 섹션 */
    #timerInputSection {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      text-align: center;
    }
    
    #timerInputSection label {
      font-weight: bold;
      display: block;
      margin-bottom: 15px;
    }
    
    .timer-inputs {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    
    .timer-input {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .timer-input input {
      width: 50px;
      padding: 8px;
      font-size: 18px;
      text-align: center;
      border: 2px solid #667eea;
      border-radius: 6px;
      font-weight: bold;
    }
    
    .timer-input label {
      font-size: 12px;
      margin-top: 5px;
      color: #666;
    }
    
    .timer-sep {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }
    
    @media (max-width: 600px) {
      .controls-section {
        padding: 20px;
      }
      
      .time-display {
        font-size: 60px;
        letter-spacing: 2px;
      }
      
      .time-label {
        font-size: 16px;
      }
      
      .keyboard-hints {
        grid-template-columns: 1fr;
      }
      
      .timer-inputs {
        flex-direction: column;
      }
      
      .timer-sep {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-section">
      <div class="loading" id="loadingText" style="display: none;">로딩 중...</div>
      <video id="videoPlayer" muted playsinline></video>
      <div class="text-overlay" id="textOverlay"></div>
      <div class="time-overlay" id="timeOverlay">
        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="time-label" id="timeLabel">영상 시작 준비 중...</div>
      </div>
    </div>
    
    <div class="controls-section">
      <div class="keyboard-hints">
        <div class="hint">
          <div class="hint-key">Q</div>
          <div class="hint-text">현재 시각<br></div>
        </div>
        <div class="hint">
          <div class="hint-key">W</div>
          <div class="hint-text">스톱워치<br>스페이스: 시작/정지</div>
        </div>
        <div class="hint">
          <div class="hint-key">E</div>
          <div class="hint-text">타이머<br>시간 직접 설정</div>
        </div>
      </div>

      <!-- 타이머 입력 섹션 (모드3에서만 표시) -->
      <div id="timerInputSection">
        <label>타이머 설정 (시간:분:초)</label>
        <div class="timer-inputs">
          <div class="timer-input">
            <input type="number" id="timerHours" min="0" max="23" placeholder="00" value="0">
            <label>시간</label>
          </div>
          <div class="timer-sep">:</div>
          <div class="timer-input">
            <input type="number" id="timerMinutes" min="0" max="59" placeholder="00" value="0">
            <label>분</label>
          </div>
          <div class="timer-sep">:</div>
          <div class="timer-input">
            <input type="number" id="timerSeconds" min="0" max="59" placeholder="00" value="0">
            <label>초</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 타이머 종료 음성 -->
  <audio id="timerAudio" preload="auto">
    <source src="timer-sound.m4a" type="audio/mp4">
  </audio>

  <!-- 배경음악 (1, 2, 3 화면) -->
  <audio id="bgmAudio" preload="auto" loop>
    <source src="bgm.m4a" type="audio/mp4">
  </audio>

  <!-- 외부 스크립트 로드 -->
  <script src="video_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
